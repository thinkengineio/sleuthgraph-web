version: 2
updates:
  - package-ecosystem: npm
    directory: "/"
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
    labels:
      - dependencies
    groups:
      next:
        patterns:
          - "next"
          - "eslint-config-next"
      mantine:
        patterns:
          - "@mantine/*"
      types:
        patterns:
          - "@types/*"
